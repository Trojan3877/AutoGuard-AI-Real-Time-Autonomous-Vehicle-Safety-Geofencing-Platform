name: Daily Performance Benchmarks

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch: # Allows you to trigger it manually from the UI

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/python-version@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install numpy

      - name: Run Benchmark
        run: |
          python metrics.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add metrics_report.json
          git commit -m "chore: automated daily performance metrics update [skip ci]" || echo "No changes to commit"
          git push
