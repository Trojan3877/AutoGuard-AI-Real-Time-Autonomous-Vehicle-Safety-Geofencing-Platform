name: AutoGuard CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lint tools
        run: pip install flake8

      - name: Run flake8
        run: flake8 apps/ services/ libs/ scripts/ tests/ --max-line-length=120

  test-build:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest coverage

      - name: Run Tests
        run: |
          PYTHONPATH=. pytest tests/ -v

      - name: Generate Coverage
        run: |
          PYTHONPATH=. coverage run -m pytest tests/
          coverage report --fail-under=60

