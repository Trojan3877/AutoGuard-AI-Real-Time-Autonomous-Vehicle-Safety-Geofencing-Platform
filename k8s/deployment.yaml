apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoguard-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: autoguard
  template:
    metadata:
      labels:
        app: autoguard
    spec:
      containers:
        - name: api
          image: autoguard-api:latest
          ports:
            - containerPort: 8000
