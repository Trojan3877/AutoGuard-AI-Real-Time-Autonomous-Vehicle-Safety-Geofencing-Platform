# =============================================================================
# SonarCloud project configuration
# =============================================================================
# These values must match what is registered in your SonarCloud account.
# - sonar.organization: the SonarCloud organization key (your GitHub username
#   or org handle, all lower-case). Visit https://sonarcloud.io/account/organizations
# - sonar.projectKey:   <organization>_<repository-name>
#
# IMPORTANT: Set the SONAR_TOKEN secret in your GitHub repository before this
# workflow can authenticate with SonarCloud.
# GitHub → Settings → Secrets and variables → Actions → New repository secret
# Name: SONAR_TOKEN  Value: <token from https://sonarcloud.io/account/security>
# =============================================================================

sonar.projectKey=Trojan3877_AutoGuard-AI-Real-Time-Autonomous-Vehicle-Safety-Geofencing-Platform
sonar.organization=trojan3877

sonar.projectName=AutoGuard AI – Real-Time Autonomous Vehicle Safety & Geofencing Platform
sonar.projectVersion=0.1.0

# ---------------------------------------------------------------------------
# Source & test directories
# ---------------------------------------------------------------------------
sonar.sources=apps,services,libs,scripts
sonar.tests=tests
sonar.exclusions=\
  **/node_modules/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  libs/risk-engine-cpp/**,\
  infra/**,\
  docs/**,\
  htmlcov/**,\
  .venv/**

sonar.test.inclusions=tests/**/*.py

# ---------------------------------------------------------------------------
# Python-specific settings
# ---------------------------------------------------------------------------
sonar.python.version=3.10

# Coverage report generated by `coverage xml` in the sonar.yml workflow step.
# Path is relative to the project base directory.
sonar.python.coverage.reportPaths=coverage.xml
