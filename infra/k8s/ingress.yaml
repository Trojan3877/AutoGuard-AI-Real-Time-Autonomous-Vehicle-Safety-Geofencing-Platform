apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: autoguard-ingress
  namespace: autoguard
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        # TODO: replace with your actual hostname before deploying to production
        - autoguard.example.com
      secretName: autoguard-tls
  rules:
    - host: autoguard.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: autoguard-api
                port:
                  number: 8000
