apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoguard-api
  namespace: autoguard
  labels:
    app: autoguard-api
    version: "latest"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: autoguard-api
  template:
    metadata:
      labels:
        app: autoguard-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: autoguard-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
        - name: api
          image: trojan3877/autoguard-ai:latest  # TODO: replace with a specific tag (e.g. v0.1.0) before deploying to production
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: grpc
              containerPort: 50051
              protocol: TCP
          env:
            - name: PYTHONPATH
              value: /app
            - name: LOG_LEVEL
              value: INFO
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: autoguard-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: autoguard-config
                  key: REDIS_PORT
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: autoguard-config
                  key: KAFKA_BOOTSTRAP_SERVERS
          envFrom:
            - secretRef:
                name: autoguard-secrets
                optional: true
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: 8000
            failureThreshold: 30
            periodSeconds: 10
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: "500m"
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - autoguard-api
                topologyKey: kubernetes.io/hostname
